version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fiscal_postgres
    environment:
      POSTGRES_USER: fiscal_user
      POSTGRES_PASSWORD: fiscal_password
      POSTGRES_DB: fiscal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiscal_user -d fiscal_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fiscal_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fiscal_mq
      RABBITMQ_DEFAULT_PASS: fiscal_mq_pass
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fiscal_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  webapi:
    build:
      context: .
      dockerfile: FiscalMiddleware.WebAPI/Dockerfile
    container_name: fiscal_webapi
    ports:
      - "5074:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PostgresConnection=Host=postgres;Port=5432;Database=fiscal_db;Username=fiscal_user;Password=fiscal_password
      - ConnectionStrings__RabbitMqConnection=amqp://fiscal_mq:fiscal_mq_pass@rabbitmq:5672/
      - ConnectionStrings__RedisConnection=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: FiscalMiddleware.Worker/Dockerfile
    container_name: fiscal_worker
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__PostgresConnection=Host=postgres;Port=5432;Database=fiscal_db;Username=fiscal_user;Password=fiscal_password
      - ConnectionStrings__RabbitMqConnection=amqp://fiscal_mq:fiscal_mq_pass@rabbitmq:5672/
      - ConnectionStrings__RedisConnection=redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
